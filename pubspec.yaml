name: invoice_generator_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^11.0.0
  provider: ^6.1.1
  flutter_local_notifications: ^16.1.0
  timezone: ^0.9.2
  intl: ^0.18.1
  uuid: ^4.1.0
  image_picker: ^1.0.4
  fl_chart: ^0.66.0
  shared_preferences: ^2.2.2
  pdf: ^3.10.7
  printing: ^5.11.1
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "lib/assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - lib/assets/icon.png
